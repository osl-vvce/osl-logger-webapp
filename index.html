<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Check-in</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h1>Visitor Check-in</h1>
        <p>Please fill out the form to check in.</p>

        <form>
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" name="fullName" required>

            <label for="USN">USN:</label>
            <input type="text" id="USN" name="USN" required>

            <label for="CheckInTime">Check-in Time:</label>
            <input type="time" id="CheckInTime" name="CheckInTIme" required>

            <label for="CheckOutTime">Check-out Time:</label>
            <input type="time" id="CheckOutTime" name="CheckOutTIme" required>

            <label for="reason">Purpose Of Visit:</label>
            <textarea id="reason" name="reason" rows="4" required></textarea>

            <label for="progress">Progress Of Work:</label>
            <textarea id="progress" name="progress" rows="4" ></textarea>

            <button type="submit">Check In</button>
        </form>
    </div>

</body>
</html>
